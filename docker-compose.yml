# docker-compose.yml — Orchestration des services
# ENSEA AS Data Science — Projet Web Scraping

services:

  # ── 1. Base de données PostgreSQL ───────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: jiji_db
    environment:
      POSTGRES_DB:       jiji_mode
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 2. Redis (broker Celery) ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: jiji_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 3. API Flask ─────────────────────────────────────────────────────────────
  api:
    build: .
    container_name: jiji_api
    command: python run.py
    environment:
      DATABASE_URL:           postgresql://postgres:postgres@db:5432/jiji_mode
      CELERY_BROKER_URL:      redis://redis:6379/0
      CELERY_RESULT_BACKEND:  redis://redis:6379/0
      SECRET_KEY:             ensea-secret-2025
      FLASK_ENV:              development
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    restart: on-failure

  # ── 4. Celery Worker ─────────────────────────────────────────────────────────
  celery_worker:
    build: .
    container_name: jiji_celery_worker
    command: celery -A tasks.celery_app.celery_app worker --loglevel=info
    environment:
      DATABASE_URL:           postgresql://postgres:postgres@db:5432/jiji_mode
      CELERY_BROKER_URL:      redis://redis:6379/0
      CELERY_RESULT_BACKEND:  redis://redis:6379/0
    depends_on:
      - redis
      - db
    volumes:
      - .:/app
    restart: on-failure

  # ── 5. Celery Beat (planification automatique) ───────────────────────────────
  celery_beat:
    build: .
    container_name: jiji_celery_beat
    command: celery -A tasks.celery_app.celery_app beat --loglevel=info
    environment:
      DATABASE_URL:           postgresql://postgres:postgres@db:5432/jiji_mode
      CELERY_BROKER_URL:      redis://redis:6379/0
      CELERY_RESULT_BACKEND:  redis://redis:6379/0
    depends_on:
      - redis
      - db
    volumes:
      - .:/app
    restart: on-failure

  # ── 6. Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: jiji_prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - api

  # ── 7. Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: jiji_grafana
    environment:
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP:     "false"
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  grafana_data:
